<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif;
    background: #0B1F3A;
    color: #FFFFFF;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 24px;
  }
  .card {
    max-width: 420px;
  }
  .logo {
    font-size: 14px;
    letter-spacing: 0.05em;
    color: #9FB4D6;
    margin-bottom: 24px;
  }
  h1 {
    font-size: 20px;
    font-weight: 500;
    line-height: 1.6;
    margin-bottom: 16px;
  }
  p {
    font-size: 14px;
    color: #C4D2E8;
    line-height: 1.8;
    margin-bottom: 32px;
  }
  .spinner {
    width: 32px;
    height: 32px;
    border: 3px solid rgba(255,255,255,0.2);
    border-top-color: #FFFFFF;
    border-radius: 50%;
    margin: 0 auto 32px;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  a.manual-link {
    display: inline-block;
    background: #FFFFFF;
    color: #0B1F3A;
    font-size: 15px;

<script>
  document.getElementById('manual-link').addEventListener('click', function(e) {
    if (typeof fbq === 'function') {
